services:
  - type: web
    name: binance-claw-quiz-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: binance_claw_quiz
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11.0"

  - type: web
    name: binance-claw-quiz-app
    runtime: static
    region: oregon
    plan: free
    buildCommand: yarn install && yarn build
    staticPublishPath: build
    rootDir: frontend
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
